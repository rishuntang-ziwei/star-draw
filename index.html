<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>全知之眼 · 先知斗數神牌</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="scene">
      <header class="topbar">
        <button type="button" class="pill-btn icon-btn" id="infoBtn" title="抽牌說明">i</button>
        <div class="topbar-spacer"></div>
      </header>

      <main class="viewport">
        <h1 class="brand" id="brand">全知之眼</h1>

        <p class="hint" id="hint">點擊卡牌開始</p>

        <div class="table" id="table"></div>

        <div class="picked-row" id="pickedRow"></div>

        <div class="controls" id="controls"></div>
      </main>

      <dialog class="info-dialog" id="infoDialog">
        <h2>抽牌流程</h2>
        <ol>
          <li>第一輪：14 張主星扇形展開，抽出 2 張</li>
          <li>第二輪：14 張乙級輔星扇形展開，抽出 2 張</li>
          <li>第三輪：12 張丙級輔星扇形展開，抽出 2 張</li>
          <li>第四輪：四化 + 空牌扇形展開，抽出 1 張</li>
          <li>最後依序翻開全部 7 張牌</li>
        </ol>
        <button type="button" class="pill-btn" id="closeInfoBtn">知道了</button>
      </dialog>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
